<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Table Editor</title>
<style>
  :root {
    --bg: #1e1e2e;
    --surface: #282840;
    --border: #3a3a55;
    --text: #cdd6f4;
    --text-muted: #9399b2;
    --accent: #89b4fa;
    --accent-hover: #74c7ec;
    --danger: #f38ba8;
    --danger-hover: #e06c88;
    --success: #a6e3a1;
    --warning: #f9e2af;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
  }
  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 24px; display: flex; align-items: center;
    justify-content: space-between; flex-wrap: wrap; gap: 12px;
    position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-size: 1.3rem; font-weight: 600; }
  header h1 span { color: var(--accent); }
  .file-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
  .file-tab {
    padding: 6px 16px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--text-muted); cursor: pointer;
    font-size: 0.85rem; transition: all 0.15s;
  }
  .file-tab:hover { color: var(--text); border-color: var(--accent); }
  .file-tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .btn {
    padding: 7px 16px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); cursor: pointer;
    font-size: 0.85rem; font-weight: 500; transition: all 0.15s; white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .btn.primary:hover { background: var(--accent-hover); }
  .btn.danger { color: var(--danger); }
  .btn.danger:hover { background: var(--danger); color: var(--bg); border-color: var(--danger); }
  .status-bar {
    display: flex; align-items: center; gap: 10px; padding: 8px 24px;
    font-size: 0.8rem; color: var(--text-muted); background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); }
  .status-dot.saved { background: var(--success); }
  .status-dot.unsaved { background: var(--warning); animation: pulse 1.5s infinite; }
  .status-dot.error { background: var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .table-wrapper {
    margin: 16px 24px; overflow-x: auto; border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; min-width: 600px; }
  thead { background: var(--surface); position: sticky; top: 0; z-index: 2; }
  th {
    padding: 10px 12px; text-align: left; font-weight: 600;
    color: var(--text-muted); border-bottom: 2px solid var(--border);
    white-space: nowrap; user-select: none;
  }
  th.col-actions { width: 90px; text-align: center; }
  th.col-num { width: 44px; }
  th.col-check { width: 40px; text-align: center; }
  td { padding: 6px 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
  td[contenteditable] {
    cursor: text; outline: none; border-radius: 3px; transition: background 0.1s;
    min-width: 60px; max-width: 350px; overflow: hidden; text-overflow: ellipsis;
  }
  td[contenteditable]:hover { background: rgba(137, 180, 250, 0.08); }
  td[contenteditable]:focus {
    background: rgba(137, 180, 250, 0.15);
    box-shadow: inset 0 0 0 1px var(--accent);
    overflow: visible; white-space: pre-wrap; word-break: break-all; max-width: none;
  }
  td.dropdown-cell { padding: 2px 4px; }
  td.dropdown-cell select {
    width: 100%; min-width: 120px; padding: 5px 8px; border-radius: 4px;
    border: 1px solid var(--border); background: var(--surface); color: var(--text);
    font-size: 0.82rem; cursor: pointer; outline: none;
  }
  td.dropdown-cell select:focus {
    border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent);
  }
  tr.paste-highlight td { animation: pasteFlash 0.6s ease-out; }
  @keyframes pasteFlash { from { background: rgba(137, 180, 250, 0.3); } to { background: transparent; } }

  /* Description Syntax Highlighting */
  .desc-display {
    white-space: pre-wrap; word-break: break-word;
    font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.78rem;
    line-height: 1.5; padding: 6px 8px; cursor: pointer;
    border-radius: 4px; min-height: 24px;
    background: rgba(0,0,0,0.15);
    max-width: 450px;
  }
  .desc-display:hover { background: rgba(137, 180, 250, 0.06); }

  .syn-valid     { color: #a6e3a1; font-weight: 600; }
  .syn-invalid   { color: #f38ba8; text-decoration: line-through; }
  .syn-incomplete { color: #fab387; }
  .syn-url       { color: #89b4fa; text-decoration: underline; }
  .syn-br        { color: #6c7086; font-style: italic; }
  .syn-tag       { color: #6c7086; }

  /* Description Preview Panel */
  .desc-preview-panel {
    margin: 0 24px 16px; padding: 14px 18px;
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--surface); display: none;
  }
  .desc-preview-panel.visible { display: block; }
  .desc-preview-panel h4 {
    font-size: 0.75rem; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;
  }
  .desc-preview-content {
    font-size: 0.85rem; line-height: 1.7;
  }

  /* Auto-Complete Dropdown */
  .autocomplete-popup {
    position: fixed; z-index: 999;
    background: var(--surface); border: 1px solid var(--accent);
    border-radius: var(--radius); max-height: 220px; overflow-y: auto;
    min-width: 200px; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    display: none;
  }
  .autocomplete-popup.visible { display: block; }
  .autocomplete-item {
    padding: 8px 14px; cursor: pointer; font-size: 0.82rem;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }
  .autocomplete-item:last-child { border-bottom: none; }
  .autocomplete-item:hover, .autocomplete-item.active {
    background: rgba(137, 180, 250, 0.15); color: var(--accent);
  }
  .autocomplete-item .ac-sub { font-size: 0.7rem; color: var(--text-muted); display: block; }

  /* Row */
  tr:hover td { background: rgba(255,255,255,0.02); }
  tr.row-new { animation: highlight 2s ease-out; }
  @keyframes highlight { from { background: rgba(166, 227, 161, 0.2); } }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-state p { font-size: 0.95rem; }
  @media (max-width: 768px) {
    header { padding: 10px 14px; }
    .table-wrapper { margin: 10px 8px; }
    td[contenteditable] { max-width: 180px; }
  }
</style>
</head>
<body>
<header>
  <h1>📊 JSON <span>Table Editor</span></h1>
  <div class="file-tabs" id="fileTabs"></div>
  <div class="toolbar">
    <button class="btn primary" onclick="addRow()" title="Add a new row (Ctrl+N)">＋ Add Row</button>
    <button class="btn" onclick="saveData()" title="Save changes to disk (Ctrl+S)">💾 Save</button>
    <button class="btn" onclick="exportCSV()" title="Download as CSV">📥 CSV</button>
    <button class="btn danger" onclick="confirmDeleteSelected()" title="Delete selected rows">🗑 Delete</button>
  </div>
</header>
<div class="status-bar">
  <span>File: <strong id="currentFile">—</strong></span>
  <span>|</span>
  <span id="rowCount">0 rows</span>
  <span>|</span>
  <span class="status-dot" id="statusDot"></span>
  <span id="statusText">Ready</span>
</div>
<div class="table-wrapper">
  <table>
    <thead id="tableHead"></thead>
    <tbody id="tableBody">
      <tr><td colspan="99" class="empty-state">
        <div class="icon">📂</div>
        <p>Select a JSON file from the tabs above to get started.<br>
        <small>Tip: You can paste tabular data directly from Google Sheets (Ctrl+V)</small></p>
      </td></tr>
    </tbody>
  </table>
</div>

<!-- Description Preview Panel -->
<div class="desc-preview-panel" id="descPreview">
  <h4>📝 Description Preview</h4>
  <div class="desc-preview-content" id="descPreviewContent"></div>
</div>

<!-- Auto-Complete Dropdown -->
<div class="autocomplete-popup" id="autocompletePopup"></div>

<script>
let currentFile = null;
let currentData = [];
let originalData = null;
let isDirty = false;
let lookupData = {};
let allKeys = [];

const linkedColumns = {
  'events.json': {
    'place': {
      lookupFile: 'places.json',
      lookupKey: 'title',
      autofill: { 'placeurl': 'googleurl' }
    }
  }
};

document.addEventListener('DOMContentLoaded', loadFileList);

async function loadFileList() {
  try {
    const resp = await fetch('/api/files');
    const files = await resp.json();
    // Filter out deprecated files
    const active = files.filter(f => f !== 'notifications.json');
    renderFileTabs(active);
    if (active.length > 0) selectFile(active[0]);
  } catch (err) { setStatus('error', 'Failed to load file list'); }
}

function renderFileTabs(files) {
  document.getElementById('fileTabs').innerHTML = files.map(f =>
    `<button class="file-tab" data-file="${f}" onclick="selectFile('${f}')">${f}</button>`
  ).join('');
}

function highlightActiveTab(filename) {
  document.querySelectorAll('.file-tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.file === filename);
  });
}

async function selectFile(filename) {
  if (isDirty && !confirm('You have unsaved changes. Discard them?')) return;
  currentFile = filename;
  highlightActiveTab(filename);
  document.getElementById('currentFile').textContent = filename;
  hideDescPreview();
  setStatus('', 'Loading...');
  try {
    const resp = await fetch('/api/data/' + encodeURIComponent(filename));
    if (!resp.ok) throw new Error((await resp.json()).error || 'Load failed');
    currentData = await resp.json();
    originalData = JSON.parse(JSON.stringify(currentData));
    isDirty = false;
    await loadLookupData(filename);
    renderTable();
    setStatus('saved', currentData.length + ' rows loaded');
  } catch (err) {
    setStatus('error', err.message);
    currentData = [];
    renderTable();
  }
}

async function loadLookupData(filename) {
  const links = linkedColumns[filename];
  if (!links) {
    await ensureAutocompleteData();
    return;
  }
  for (const [col, cfg] of Object.entries(links)) {
    if (lookupData[cfg.lookupFile]) continue;
    try {
      const resp = await fetch('/api/data/' + encodeURIComponent(cfg.lookupFile));
      if (resp.ok) lookupData[cfg.lookupFile] = await resp.json();
    } catch (_) {}
  }
  await ensureAutocompleteData();
}

async function ensureAutocompleteData() {
  for (const f of ['places.json', 'events.json']) {
    if (!lookupData[f]) {
      try {
        const resp = await fetch('/api/data/' + f);
        if (resp.ok) lookupData[f] = await resp.json();
      } catch (_) {}
    }
  }
}

function renderTable() {
  const thead = document.getElementById('tableHead');
  const tbody = document.getElementById('tableBody');
  if (!currentData.length) {
    thead.innerHTML = '';
    tbody.innerHTML = '<tr><td colspan="99" class="empty-state"><div class="icon">📭</div><p>No data in <strong>' + currentFile + '</strong>. Click "＋ Add Row" to begin.</p></td></tr>';
    document.getElementById('rowCount').textContent = '0 rows';
    updateStatusDot();
    return;
  }
  allKeys = [];
  const seen = new Set();
  for (const row of currentData) {
    if (row && typeof row === 'object') {
      for (const key of Object.keys(row)) {
        if (!seen.has(key)) { seen.add(key); allKeys.push(key); }
      }
    }
  }
  const fileLinks = linkedColumns[currentFile] || {};
  thead.innerHTML = '<tr><th class="col-check"><input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)" title="Select all"></th><th class="col-num">#</th>' +
    allKeys.map(k => '<th>' + escapeHtml(k) + (fileLinks[k] ? ' 🔗' : '') + '</th>').join('') +
    '<th class="col-actions">Actions</th></tr>';

  tbody.innerHTML = currentData.map((row, idx) => {
    return '<tr id="row-' + idx + '" data-index="' + idx + '">' +
      '<td style="text-align:center"><input type="checkbox" class="row-check" data-index="' + idx + '"></td>' +
      '<td class="row-num">' + (idx + 1) + '</td>' +
      allKeys.map(key => renderCell(key, row, idx, fileLinks)).join('') +
      '<td style="text-align:center;white-space:nowrap">' +
        '<button class="btn" onclick="duplicateRow(' + idx + ')" title="Duplicate" style="padding:3px 8px;font-size:0.75rem">⧉</button> ' +
        '<button class="btn danger" onclick="deleteRow(' + idx + ')" title="Delete" style="padding:3px 8px;font-size:0.75rem">✕</button>' +
      '</td></tr>';
  }).join('');

  tbody.addEventListener('input', onCellInput);
  tbody.addEventListener('focusout', onCellBlur);
  tbody.addEventListener('change', onDropdownChange);
  tbody.addEventListener('paste', onPaste);
  document.getElementById('rowCount').textContent = currentData.length + ' rows × ' + allKeys.length + ' cols';
  updateStatusDot();
}

function renderCell(key, row, idx, fileLinks) {
  let rawVal = (row && typeof row === 'object') ? row[key] : '';
  if (rawVal === null || rawVal === undefined) rawVal = '';
  const strVal = (typeof rawVal === 'object') ? JSON.stringify(rawVal) : String(rawVal);
  const escVal = escapeHtml(strVal);
  const linkCfg = fileLinks[key];
  if (linkCfg) {
    const lookupRows = lookupData[linkCfg.lookupFile] || [];
    const options = lookupRows.map(r => {
      const label = r[linkCfg.lookupKey] ?? '';
      const sel = (label === rawVal) ? ' selected' : '';
      return '<option value="' + escapeHtml(String(label)) + '"' + sel + '>' + escapeHtml(String(label)) + '</option>';
    });
    return '<td class="dropdown-cell" data-key="' + escapeHtml(key) + '" data-index="' + idx + '">' +
      '<select data-key="' + escapeHtml(key) + '" data-index="' + idx + '">' +
      '<option value="">—</option>' + options.join('') + '</select></td>';
  }
  // Description field in appcontent.json gets special rich display
  if (currentFile === 'appcontent.json' && key === 'description') {
    return '<td class="desc-cell" data-key="' + escapeHtml(key) + '" data-index="' + idx + '">' +
      '<div class="desc-display" data-key="' + escapeHtml(key) + '" data-index="' + idx + '" onclick="editDescription(this)">' +
        highlightDescription(strVal) +
      '</div></td>';
  }
  return '<td contenteditable="true" data-key="' + escapeHtml(key) + '" data-index="' + idx + '" data-original="' + escVal + '">' + escVal + '</td>';
}

function onDropdownChange(e) {
  const select = e.target.closest('select');
  if (!select) return;
  const idx = parseInt(select.dataset.index);
  const key = select.dataset.key;
  const newVal = select.value;
  const fileLinks = linkedColumns[currentFile] || {};
  const linkCfg = fileLinks[key];
  currentData[idx][key] = newVal;
  isDirty = true;
  updateStatusDot();
  if (linkCfg && linkCfg.autofill && newVal) {
    const lookupRows = lookupData[linkCfg.lookupFile] || [];
    const match = lookupRows.find(r => String(r[linkCfg.lookupKey] ?? '') === newVal);
    if (match) {
      for (const [targetCol, sourceCol] of Object.entries(linkCfg.autofill)) {
        currentData[idx][targetCol] = match[sourceCol] ?? '';
      }
      renderTable();
      setStatus('unsaved', 'Place selected — ' + Object.keys(linkCfg.autofill).join(', ') + ' auto-filled');
      return;
    }
  }
  if (newVal) setStatus('unsaved', 'Place changed');
}

function onCellInput(e) {
  const td = e.target.closest('td[contenteditable]');
  if (!td) return;
  isDirty = true;
  updateStatusDot();
  // If editing a description cell in appcontent.json, update the preview
  if (td.dataset.key === 'description' && currentFile === 'appcontent.json') {
    updateDescPreview(td.textContent || '');
    checkAutocomplete(td, e);
  }
}

function onCellBlur(e) {
  const td = e.target.closest('td[contenteditable]');
  if (!td) return;
  const idx = parseInt(td.dataset.index);
  const key = td.dataset.key;
  let newVal = td.textContent.trim();
  const origVal = currentData[idx]?.[key];
  if (typeof origVal === 'number' && newVal !== '' && !isNaN(Number(newVal))) {
    newVal = Number(newVal);
  } else if (typeof origVal === 'boolean') {
    if (newVal.toLowerCase() === 'true') newVal = true;
    else if (newVal.toLowerCase() === 'false') newVal = false;
  } else if (origVal && typeof origVal === 'object' && newVal !== '') {
    try { newVal = JSON.parse(newVal); } catch (_) {}
  }
  if (newVal === '') newVal = (typeof origVal === 'number') ? 0 : (typeof origVal === 'boolean' ? false : '');
  currentData[idx][key] = newVal;
  setStatus('unsaved', 'Unsaved changes');
}

// ═══════════════════════════════════════
//  DESCRIPTION SYNTAX HIGHLIGHTING
//  Parses <link>/place/X</link>, <event>X+Y+Z</event>,
//  <a href='...'>text</a>, <br> tags.
//  Green = valid reference. Orange = incomplete tag.
// ═══════════════════════════════════════
function highlightDescription(text) {
  if (!text) return '';

  // Pre-compute lookup sets
  const placeNames = new Set();
  const eventKeys = [];
  if (lookupData['places.json']) {
    lookupData['places.json'].forEach(p => { if (p.title) placeNames.add(p.title.toLowerCase()); });
  }
  if (lookupData['events.json']) {
    lookupData['events.json'].forEach(ev => {
      const key = (ev.name || '') + '+' + (ev.place || '') + '+' + (ev.eventday || '');
      eventKeys.push({ name: ev.name || '', place: ev.place || '', day: ev.eventday || '', key: key.toLowerCase() });
    });
  }

  let html = escapeHtml(text);
  let hasMatch = false;

  // 1. Place links: <place>NAME</place>
  html = html.replace(/&lt;place&gt;([^&]+)&lt;\/place&gt;/gi, function(m, name) {
    const rawName = unescapeHtml(name);
    const isValid = placeNames.has(rawName.toLowerCase());
    hasMatch = true;
    return '<span class="syn-tag">&lt;place&gt;</span><span class="' +
      (isValid ? 'syn-valid' : 'syn-invalid') + '" title="' + (isValid ? '✅ Valid place' : '❌ Place not found in places.json') + '">' +
      name + '</span><span class="syn-tag">&lt;/place&gt;</span>';
  });

  // 2. Valid event links: <event>NAME+PLACE+DAY</event>
  // Uses .+? (lazy) because event names can contain & (e.g. "CLAYTON CARTY & ACOUSTICS")
  html = html.replace(/&lt;event&gt;(.+?)&lt;\/event&gt;/gi, function(m, key) {
    const rawKey = unescapeHtml(key);
    const parts = rawKey.split('+');
    const evName = (parts[0] || '').trim();
    const evPlace = (parts[1] || '').trim();
    const evDay = (parts[2] || '').trim();
    const isValid = eventKeys.some(ek => {
      return (evName === '' || ek.name.toLowerCase().includes(evName.toLowerCase()))
          && (evPlace === '' || ek.place.toLowerCase().includes(evPlace.toLowerCase()))
          && (evDay === '' || ek.day.toLowerCase().includes(evDay.toLowerCase()));
    });
    hasMatch = true;
    return '<span class="syn-tag">&lt;event&gt;</span><span class="' +
      (isValid ? 'syn-valid' : 'syn-invalid') + '" title="' + (isValid ? '✅ Valid event' : '❌ Event not found') + '">' +
      key + '</span><span class="syn-tag">&lt;/event&gt;</span>';
  });

  // 3. URL links: <a href='URL'>text</a> or <a href="URL">text</a>
  html = html.replace(/&lt;a\s+href=(?:&#39;|&quot;)([^'&]*?)(?:&#39;|&quot;)&gt;([^&]*)&lt;\/a&gt;/gi, function(m, url, txt) {
    hasMatch = true;
    return '<span class="syn-tag">&lt;a href=&#39;</span><span class="syn-url">' + url + '</span><span class="syn-tag">&#39;&gt;</span>' +
      txt + '<span class="syn-tag">&lt;/a&gt;</span>';
  });

  // 4. Line breaks: <br>, <br/>, <br />
  html = html.replace(/&lt;br\s*\/?&gt;/gi, '<span class="syn-br">↵&lt;br&gt;</span>');

  // 5. Incomplete tags (opened but not closed) — only if no valid tags matched
  if (!hasMatch) {
    // Incomplete <place> (no closing </place>)
    html = html.replace(/&lt;place&gt;(?!.*&lt;\/place&gt;)(.*)$/gi, function(m, rest) {
      return '<span class="syn-tag">&lt;place&gt;</span><span class="syn-incomplete">' + rest + '</span>';
    });
    // Incomplete <event> (no closing </event>)
    html = html.replace(/&lt;event&gt;(?!.*&lt;\/event&gt;)(.*)$/gi, function(m, rest) {
      return '<span class="syn-tag">&lt;event&gt;</span><span class="syn-incomplete">' + rest + '</span>';
    });
  }

  return html;
}

function unescapeHtml(str) {
  const div = document.createElement('div');
  div.innerHTML = str;
  return div.textContent || '';
}

// ═══════════════════════════════════════
//  DESCRIPTION PREVIEW PANEL
// ═══════════════════════════════════════
function updateDescPreview(text) {
  const panel = document.getElementById('descPreview');
  const content = document.getElementById('descPreviewContent');
  if (!text) {
    panel.classList.remove('visible');
    return;
  }
  panel.classList.add('visible');
  content.innerHTML = highlightDescription(text);
}

function hideDescPreview() {
  document.getElementById('descPreview').classList.remove('visible');
}

// ═══════════════════════════════════════
//  CLICK-TO-EDIT DESCRIPTION
// ═══════════════════════════════════════
function editDescription(div) {
  const key = div.dataset.key;
  const idx = parseInt(div.dataset.index);
  const rawText = currentData[idx] ? String(currentData[idx][key] || '') : '';

  // Replace the display div with a contenteditable div
  const td = div.parentElement;
  td.innerHTML = '';
  const editable = document.createElement('div');
  editable.contentEditable = 'true';
  editable.className = 'desc-display';
  editable.style.cursor = 'text';
  editable.style.background = 'rgba(137, 180, 250, 0.1)';
  editable.style.outline = 'none';
  editable.style.boxShadow = 'inset 0 0 0 1px #89b4fa';
  editable.dataset.key = key;
  editable.dataset.index = idx;
  editable.textContent = rawText;
  editable.addEventListener('input', function(e) {
    isDirty = true;
    updateStatusDot();
    updateDescPreview(editable.textContent || '');
    checkAutocomplete(editable, e);
  });
  editable.addEventListener('blur', function() {
    const newVal = editable.textContent || '';
    currentData[idx][key] = newVal;
    // Re-render the cell as display
    td.innerHTML = '<div class="desc-display" data-key="' + escapeHtml(key) +
      '" data-index="' + idx + '" onclick="editDescription(this)">' +
      highlightDescription(newVal) + '</div>';
    setStatus('unsaved', 'Unsaved changes');
    if (!newVal) hideDescPreview();
  });
  editable.addEventListener('paste', function(e) {
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData('text/plain');
    document.execCommand('insertText', false, text);
  });
  editable.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { editable.blur(); }
  });
  td.appendChild(editable);
  editable.focus();

  // Show preview
  updateDescPreview(rawText);
}

// ═══════════════════════════════════════
//  AUTO-COMPLETE FOR <link> AND <event>
// ═══════════════════════════════════════
let acActiveIdx = -1;
let acTrigger = null; // 'place' or 'event'

function checkAutocomplete(el, e) {
  const popup = document.getElementById('autocompletePopup');
  const text = el.textContent || '';

  // Check if the user just typed <place> or <event>
  const placeMatch = text.match(/<place>\s*$/i);
  const eventMatch = text.match(/<event>\s*$/i);

  if (placeMatch) {
    acTrigger = 'place';
    showAutocompletePopup(el, getPlaceSuggestions(''), popup);
  } else if (eventMatch) {
    acTrigger = 'event';
    showAutocompletePopup(el, getEventSuggestions(''), popup);
  } else if (e && e.key === 'Escape') {
    popup.classList.remove('visible');
    acTrigger = null;
  } else if (acTrigger && e && (e.key === 'ArrowDown' || e.key === 'ArrowUp')) {
    e.preventDefault();
    navigateAutocomplete(e.key === 'ArrowDown' ? 1 : -1, popup);
    return;
  } else if (acTrigger && e && e.key === 'Enter' && acActiveIdx >= 0) {
    e.preventDefault();
    selectAutocompleteItem(acActiveIdx, el, popup);
    return;
  } else {
    // User is typing more — if still in an incomplete tag, keep showing
    const incompletePlace = text.match(/<place>(?![\s\S]*<\/place>)/i);
    const incompleteEvent = text.match(/<event>(?![\s\S]*<\/event>)/i);
    if (incompletePlace) {
      const partial = text.substring(text.lastIndexOf('<place>') + 7).trim();
      acTrigger = 'place';
      showAutocompletePopup(el, getPlaceSuggestions(partial), popup);
    } else if (incompleteEvent) {
      const partial = text.substring(text.lastIndexOf('<event>') + 7).trim();
      acTrigger = 'event';
      showAutocompletePopup(el, getEventSuggestions(partial), popup);
    } else {
      popup.classList.remove('visible');
      acTrigger = null;
    }
  }
}

function getPlaceSuggestions(filter) {
  if (!lookupData['places.json']) return [];
  const f = filter.toLowerCase();
  return lookupData['places.json']
    .filter(p => p.title && (!f || p.title.toLowerCase().includes(f)))
    .slice(0, 15)
    .map(p => ({ label: p.title, value: p.title + '</place>', sub: p.location || p.type || '' }));
}

function getEventSuggestions(filter) {
  if (!lookupData['events.json']) return [];
  const f = filter.toLowerCase();
  return lookupData['events.json']
    .filter(ev => ev.name && (!f || ev.name.toLowerCase().includes(f)))
    .slice(0, 15)
    .map(ev => {
      const key = ev.name + '+' + (ev.place || '') + '+' + (ev.eventday || '');
      return { label: ev.name, value: key + '</event>', sub: (ev.place || '') + ' · ' + (ev.eventday || '') };
    });
}

function showAutocompletePopup(el, suggestions, popup) {
  acActiveIdx = -1;
  if (!suggestions.length) {
    popup.classList.remove('visible');
    return;
  }
  const rect = el.getBoundingClientRect();
  popup.style.left = rect.left + 'px';
  popup.style.top = (rect.bottom + 4) + 'px';
  popup.style.minWidth = Math.max(rect.width, 200) + 'px';
  popup.innerHTML = suggestions.map((s, i) =>
    '<div class="autocomplete-item" data-idx="' + i + '" onmousedown="selectAutocompleteItem(' + i + ', null, null)">' +
      '<span class="ac-icon">' + (acTrigger === 'place' ? '📍' : '🗓️') + '</span> ' +
      escapeHtml(s.label) +
      (s.sub ? '<span class="ac-sub">' + escapeHtml(s.sub) + '</span>' : '') +
    '</div>'
  ).join('');
  popup.classList.add('visible');
}

function navigateAutocomplete(dir, popup) {
  const items = popup.querySelectorAll('.autocomplete-item');
  if (!items.length) return;
  items.forEach(it => it.classList.remove('active'));
  acActiveIdx = Math.max(0, Math.min(items.length - 1, acActiveIdx + dir));
  items[acActiveIdx].classList.add('active');
  items[acActiveIdx].scrollIntoView({ block: 'nearest' });
}

function selectAutocompleteItem(idx, sourceEl, popup) {
  if (!popup) popup = document.getElementById('autocompletePopup');
  const items = popup.querySelectorAll('.autocomplete-item');
  if (idx < 0 || idx >= items.length) return;

  const item = items[idx];
  const valueEl = item.querySelector('.ac-sub');
  // Get the value from our suggestions directly
  let suggestions;
  if (acTrigger === 'place') suggestions = getPlaceSuggestions('');
  else suggestions = getEventSuggestions('');

  if (idx < suggestions.length) {
    const sel = suggestions[idx];
    const el = sourceEl || document.activeElement;
    if (el && (el.contentEditable === 'true' || el.isContentEditable)) {
      const text = el.textContent || '';
      const tag = acTrigger === 'place' ? '<place>' : '<event>';
      const tagIdx = text.lastIndexOf(tag);
      if (tagIdx >= 0) {
        const before = text.substring(0, tagIdx);
        el.textContent = before + tag + sel.value;
        // Move cursor to end
        const range = document.createRange();
        range.selectNodeContents(el);
        range.collapse(false);
        const sel2 = window.getSelection();
        sel2.removeAllRanges();
        sel2.addRange(range);
      }
      updateDescPreview(el.textContent || '');
    }
  }
  popup.classList.remove('visible');
  acTrigger = null;
}

// Close autocomplete on outside click
document.addEventListener('click', function(e) {
  const popup = document.getElementById('autocompletePopup');
  if (!popup.classList.contains('visible')) return;
  if (!e.target.closest('.autocomplete-popup') && !e.target.closest('[contenteditable]') && !e.target.closest('.desc-display')) {
    popup.classList.remove('visible');
    acTrigger = null;
  }
});

function onPaste(e) {
  const clipboardData = e.clipboardData;
  if (!clipboardData) return;
  const text = clipboardData.getData('text/plain');
  if (!text) return;
  const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
  if (!lines.length) return;
  const rows = lines.map(line => line.split('\t'));
  const firstRow = rows[0];
  const headerMatchCount = firstRow.filter(cell => {
    const norm = cell.trim().toLowerCase();
    return allKeys.some(k => k.toLowerCase() === norm);
  }).length;
  let dataRows, headerMap;
  if (headerMatchCount >= 2 && rows.length > 1) {
    headerMap = {};
    firstRow.forEach((h, ci) => {
      const norm = h.trim().toLowerCase();
      const matchKey = allKeys.find(k => k.toLowerCase() === norm);
      if (matchKey) headerMap[matchKey] = ci;
    });
    dataRows = rows.slice(1);
  } else {
    headerMap = {};
    allKeys.forEach((k, i) => { if (i < firstRow.length) headerMap[k] = i; });
    dataRows = rows;
  }
  if (!Object.keys(headerMap).length) return;
  let targetIdx = 0;
  const activeEl = document.activeElement;
  if (activeEl) {
    const td = activeEl.closest('td[data-index]');
    if (td) targetIdx = parseInt(td.dataset.index);
  }
  e.preventDefault();
  let filledCount = 0;
  const fileLinks = linkedColumns[currentFile] || {};
  for (let r = 0; r < dataRows.length; r++) {
    const rowIdx = targetIdx + r;
    while (rowIdx >= currentData.length) {
      const template = {};
      if (currentData.length > 0) {
        for (const k of Object.keys(currentData[0])) {
          const v = currentData[0][k];
          template[k] = (typeof v === 'number') ? 0 : (typeof v === 'boolean' ? false : '');
        }
      }
      currentData.push(template);
    }
    for (const [key, colIdx] of Object.entries(headerMap)) {
      if (colIdx < dataRows[r].length) {
        const cellVal = dataRows[r][colIdx].trim();
        const linkCfg = fileLinks[key];
        if (linkCfg && cellVal) {
          const lookupRows = lookupData[linkCfg.lookupFile] || [];
          const lookupKey = linkCfg.lookupKey;
          let match = lookupRows.find(r2 => String(r2[lookupKey] ?? '') === cellVal);
          if (!match) match = lookupRows.find(r2 => String(r2[lookupKey] ?? '').toLowerCase() === cellVal.toLowerCase());
          if (match) {
            currentData[rowIdx][key] = match[lookupKey];
            if (linkCfg.autofill) {
              for (const [targetCol, sourceCol] of Object.entries(linkCfg.autofill)) {
                currentData[rowIdx][targetCol] = match[sourceCol] ?? '';
              }
            }
            filledCount++;
            continue;
          }
          currentData[rowIdx][key] = cellVal;
        } else {
          const origVal = currentData[rowIdx]?.[key];
          if (typeof origVal === 'number' && cellVal !== '' && !isNaN(Number(cellVal))) {
            currentData[rowIdx][key] = Number(cellVal);
          } else if (typeof origVal === 'boolean') {
            currentData[rowIdx][key] = cellVal.toLowerCase() === 'true';
          } else {
            currentData[rowIdx][key] = cellVal;
          }
        }
        filledCount++;
      }
    }
  }
  isDirty = true;
  renderTable();
  setStatus('unsaved', 'Pasted ' + dataRows.length + ' row(s) × ' + Object.keys(headerMap).length + ' col(s)');
  setTimeout(() => {
    for (let r = 0; r < dataRows.length; r++) {
      const tr = document.getElementById('row-' + (targetIdx + r));
      if (tr) tr.classList.add('paste-highlight');
    }
  }, 50);
}

function addRow() {
  if (!currentFile) { alert('Select a file first.'); return; }
  const template = {};
  if (currentData.length > 0) {
    for (const key of Object.keys(currentData[0])) {
      const val = currentData[0][key];
      template[key] = (typeof val === 'number') ? 0 : (typeof val === 'boolean' ? false : '');
    }
  }
  currentData.push(template);
  isDirty = true;
  renderTable();
  setStatus('unsaved', 'Row added — save to persist');
  setTimeout(() => {
    const lastRow = document.querySelector('#row-' + (currentData.length - 1));
    if (lastRow) {
      lastRow.classList.add('row-new');
      lastRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
      const first = lastRow.querySelector('td[contenteditable], td.dropdown-cell select');
      if (first) first.focus();
    }
  }, 100);
}

function duplicateRow(idx) {
  const clone = JSON.parse(JSON.stringify(currentData[idx]));
  if ('id' in clone) clone.id = clone.id + '_copy';
  currentData.splice(idx + 1, 0, clone);
  isDirty = true;
  renderTable();
  setStatus('unsaved', 'Row duplicated');
}

function deleteRow(idx) {
  if (!confirm('Delete row ' + (idx + 1) + '?')) return;
  currentData.splice(idx, 1);
  isDirty = true;
  renderTable();
  setStatus('unsaved', 'Row deleted');
}

function confirmDeleteSelected() {
  const checks = document.querySelectorAll('.row-check:checked');
  if (!checks.length) { alert('No rows selected.'); return; }
  if (!confirm('Delete ' + checks.length + ' selected row(s)?')) return;
  const indices = [...checks].map(cb => parseInt(cb.dataset.index)).sort((a,b) => b - a);
  for (const idx of indices) currentData.splice(idx, 1);
  isDirty = true;
  renderTable();
  setStatus('unsaved', indices.length + ' row(s) deleted');
}

function toggleSelectAll(cb) {
  document.querySelectorAll('.row-check').forEach(rc => { rc.checked = cb.checked; });
}

async function saveData() {
  if (!currentFile) return;
  setStatus('', 'Saving...');
  try {
    const resp = await fetch('/api/data/' + encodeURIComponent(currentFile), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(currentData),
    });
    if (!resp.ok) throw new Error((await resp.json()).error || 'Save failed');
    originalData = JSON.parse(JSON.stringify(currentData));
    isDirty = false;
    const result = await resp.json();
    setStatus('saved', 'Saved ' + result.count + ' rows to ' + currentFile);
    updateStatusDot();
  } catch (err) {
    setStatus('error', 'Save failed: ' + err.message);
  }
}

function exportCSV() {
  if (!currentData.length) return;
  const keys = Object.keys(currentData[0] || {});
  const csvRows = [keys.join(',')];
  for (const row of currentData) {
    const vals = keys.map(k => {
      let v = row[k];
      if (v === null || v === undefined) return '';
      v = String(v).replace(/"/g, '""');
      return /[,"\n]/.test(v) ? '"' + v + '"' : v;
    });
    csvRows.push(vals.join(','));
  }
  const blob = new Blob([csvRows.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = currentFile.replace('.json', '.csv');
  a.click();
  URL.revokeObjectURL(url);
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveData(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'n') { e.preventDefault(); addRow(); }
});

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function setStatus(type, msg) {
  document.getElementById('statusText').textContent = msg;
  updateStatusDot();
}

function updateStatusDot() {
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot';
  if (isDirty) dot.classList.add('unsaved');
  else dot.classList.add('saved');
}

window.addEventListener('beforeunload', e => {
  if (isDirty) e.preventDefault();
});
</script>
